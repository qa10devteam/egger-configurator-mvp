name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r project/backend/requirements.txt
      - name: Lint with ruff
        run: ruff project/backend
      - name: Run tests
        run: pytest project/backend/tests || echo 'No tests yet'
      - name: Build Docker images
        run: |
          docker compose -f project/docker-compose.yml build
